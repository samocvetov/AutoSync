<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AutoSync Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0e1117; color: #fafafa; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 660px; background: #262730; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 16px; }
        h2 { text-align: center; color: #ff4b4b; margin: 0 0 10px 0; font-size: 24px; font-weight: 600; letter-spacing: 0.5px; }
        
        .input-group { display: flex; gap: 12px; align-items: center; }
        .input-group input[type="text"] { flex: 1; padding: 0 15px; height: 44px; border: 1px solid #4a4b50; border-radius: 6px; background: #0e1117; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input-group input[type="text"]:focus { border-color: #ff4b4b; }
        .input-group input[type="text"]:read-only { color: #bbb; cursor: default; }
        .browse-btn { padding: 0 20px; height: 44px; background-color: #3b3c46; color: white; border: 1px solid #555; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .browse-btn:hover { background-color: #4f505c; border-color: #777; }
        .browse-btn:active { transform: scale(0.97); }

        label.checkbox-wrapper { display: flex; align-items: center; gap: 10px; margin: 5px 0; font-size: 15px; cursor: pointer; color: #ddd; user-select: none; }
        label.checkbox-wrapper input[type="checkbox"] { width: 18px; height: 18px; accent-color: #ff4b4b; cursor: pointer; }
        
        .run-btn { width: 100%; height: 50px; background-color: #ff4b4b; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; transition: background-color 0.2s, transform 0.1s; margin-top: 5px; }
        .run-btn:hover { background-color: #ff3333; }
        .run-btn:active { transform: scale(0.98); }
        .run-btn:disabled { background-color: #555; cursor: not-allowed; transform: none; color: #888; }
        
        .progress-wrapper { display: none; flex-direction: column; gap: 8px; margin-top: 10px; }
        .progress-status { font-size: 14px; color: #ccc; font-weight: 500; display: flex; justify-content: space-between; }
        .progress-bg { width: 100%; height: 18px; background-color: #0e1117; border-radius: 9px; overflow: hidden; border: 1px solid #4a4b50; }
        .progress-fill { height: 100%; width: 0%; background-color: #ff4b4b; border-radius: 9px; transition: width 0.4s ease-out; }
        .progress-fill.striped {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
            animation: progress-stripes 1s linear infinite;
        }
        @keyframes progress-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }

        .log-box { padding: 15px; background-color: #0e1117; border-left: 4px solid #ff4b4b; border-radius: 6px; height: 80px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; color: #ccc; line-height: 1.5; margin-top: 5px; }
        .log-box::-webkit-scrollbar { width: 8px; }
        .log-box::-webkit-scrollbar-track { background: #0e1117; border-radius: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: #4a4b50; border-radius: 4px; }
        .log-box::-webkit-scrollbar-thumb:hover { background: #ff4b4b; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚡ AutoSync Wails Edition</h2>
        
        <div class="input-group">
            <input type="text" id="vPath" placeholder="Выберите видеофайл (MP4, MOV)..." readonly />
            <button class="browse-btn" id="btnVideo">📁 Обзор</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="aPath" placeholder="Мастер-аудио (оставьте пустым для простого сжатия)" readonly />
            <button class="browse-btn" id="btnAudio">📁 Обзор</button>
        </div>

        <label class="checkbox-wrapper">
            <input type="checkbox" id="compressToggle" /> 
            <span>Сжатие финального видео (CompressO - CRF 24)</span>
        </label>
        
        <button class="run-btn" id="startBtn">🚀 ЗАПУСТИТЬ</button>
        
        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-status">
                <span id="progressText">Подготовка...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="log-box" id="logBox">Ожидание файлов...</div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
